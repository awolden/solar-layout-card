# A complete /dashboard-solar view stacking all three cards.
# Drop this under `views:` in a Lovelace dashboard, then replace the layout
# JSON with your own (see docs/getting-layout-json.md).

title: Solar
path: solar
icon: mdi:solar-power
panel: true
cards:
  - type: vertical-stack
    cards:
      # Chip strip with live metrics (Now / House / Export / Today / 7d / Lifetime)
      - type: custom:solar-stats-card

      # Flow chart full-width — header chips above already cover the live values
      - type: custom:solar-flow-card
        show_stats: false
        show_title: false

      # Roof layout
      - type: custom:solar-layout-card
        arrays:
          # ----- paste your Enphase JSON's `arrays` value here -----
          - label: MP1
            x: 183
            y: 357
            azimuth: 270
            modules:
              - rotation: 0
                x: 300
                y: 107
                inverter: { serial_num: "542546078538" }
              # ... rest of your modules
