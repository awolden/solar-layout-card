# Drop this card into any Lovelace view. Paste your captured Enphase
# layout JSON's `arrays` value directly under the `arrays:` key.
#
# Two ways to get it:
#   1) Paste docs/devtools-snippet.js into your DevTools console while
#      signed into enlighten.enphaseenergy.com — navigate to your Array
#      view and the JSON gets copied to your clipboard automatically.
#   2) Capture it manually via DevTools → Network → XHR
#      (see docs/getting-layout-json.md).

type: custom:solar-layout-card

arrays:
  - label: MP1
    x: 183
    y: 357
    azimuth: 270  # west-facing
    modules:
      - rotation: 0
        x: 300
        y: 107
        inverter: { serial_num: "542546078538" }
      - rotation: 0
        x: 200
        y: 109
        inverter: { serial_num: "542546079185" }
      - rotation: 0
        x: 100
        y: 109
        inverter: { serial_num: "542546078523" }
      # ... rest of your modules

  - label: MP2
    x: 1011
    y: 127
    azimuth: 180  # south-facing
    modules:
      - rotation: 0
        x: 59
        y: 0
        inverter: { serial_num: "542545072935" }
      - rotation: 0
        x: -40
        y: 0
        inverter: { serial_num: "542510085949" }

# Optional overrides — defaults work for stock Enphase HA integration setups.
# inverter_power_entity: "sensor.inverter_{serial}"
# inverter_kwh_entity:   "sensor.inverter_{serial}_energy_production_today"
# max_w: 460
# max_kwh_per_day: 3.0
# history_hours: 12
# history_days: 14
